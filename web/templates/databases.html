<!DOCTYPE html>
<html lang="ko">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>데이터베이스 관리 - 클라우드 데이터베이스 백업 관리 시스템</title>
    <link
      href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css"
      rel="stylesheet"
    />
    <!-- 공통 UI CSS -->
    <link rel="stylesheet" href="/static/css/common.css" />
    <!-- SweetAlert2 CDN (스위트 알람) -->
    <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
    <!-- 공통 UI CSS -->
    <link rel="stylesheet" href="/static/css/common.css" />
  </head>
  <body>
    {% set active_nav = 'databases' %} {% include '_partials/nav.html' %}

    <div class="container my-4">
      <div class="d-flex justify-content-between align-items-center mb-3">
        <h2 class="ui-title m-0">데이터베이스 관리</h2>
        <div class="d-flex gap-2">
          <button class="btn btn-outline-secondary" id="btn-refresh">새로고침</button>
          <button class="btn btn-primary" data-bs-toggle="modal" data-bs-target="#dbModal">새 DB 추가</button>
        </div>
      </div>

      <!-- Filters / Search -->
      <div class="card mb-3">
        <div class="card-body">
          <form class="row gy-2 gx-2 align-items-end" id="filters-form">
            <div class="col-12 col-md-3">
              <label class="form-label">검색</label>
              <input type="text" id="flt-q" class="form-control" placeholder="이름 / 표시명 / 호스트" />
            </div>
            <div class="col-6 col-md-2">
              <label class="form-label">환경</label>
              <select id="flt-env" class="form-select">
                <option value="">전체</option>
                <option value="production">배포중</option>
                <option value="staging">테스트중</option>
                <option value="development">개발중</option>
              </select>
            </div>
            <div class="col-6 col-md-2">
              <label class="form-label">우선순위</label>
              <select id="flt-priority" class="form-select">
                <option value="">전체</option>
                <option value="high">높음</option>
                <option value="medium">중간</option>
                <option value="low">낮음</option>
              </select>
            </div>
            <div class="col-6 col-md-2">
              <label class="form-label">상태</label>
              <select id="flt-status" class="form-select">
                <option value="">전체</option>
                <option value="connected">연결됨</option>
                <option value="error">오류</option>
                <option value="unknown">알 수 없음</option>
              </select>
            </div>
            <div class="col-6 col-md-3">
              <div class="form-check mt-4">
                <input class="form-check-input" type="checkbox" id="flt-include-inactive" />
                <label class="form-check-label" for="flt-include-inactive">비활성 포함</label>
              </div>
            </div>
            <div class="col-6 col-md-2">
              <label class="form-label">정렬 기준</label>
              <select id="flt-sort" class="form-select">
                <option value="display_name">표시명</option>
                <option value="name">이름</option>
                <option value="environment">환경</option>
                <option value="priority">우선순위</option>
                <option value="host">호스트</option>
                <option value="port">포트</option>
                <option value="connection_status">상태</option>
              </select>
            </div>
            <div class="col-6 col-md-2">
              <label class="form-label">정렬 방향</label>
              <select id="flt-order" class="form-select">
                <option value="asc">오름차순</option>
                <option value="desc">내림차순</option>
              </select>
            </div>
            <div class="col-6 col-md-2">
              <label class="form-label">페이지 크기</label>
              <select id="flt-page-size" class="form-select">
                <option value="10">10</option>
                <option value="20" selected>20</option>
                <option value="50">50</option>
                <option value="100">100</option>
              </select>
            </div>
            <div class="col-12 col-md-2 ms-auto text-end">
              <button type="button" class="btn btn-outline-secondary" id="btn-clear">초기화</button>
              <button type="submit" class="btn btn-primary ms-1">적용</button>
            </div>
          </form>
        </div>
      </div>

      <div class="card">
        <div class="card-body">
          <div class="table-responsive">
            <table
              class="table table-sm table-striped align-middle"
              id="db-table"
            >
              <thead>
                <tr>
                  <th>이름</th>
                  <th>표시명</th>
                  <th>타입</th>
                  <th>환경</th>
                  <th>우선순위</th>
                  <th>호스트</th>
                  <th>포트</th>
                  <th>상태</th>
                  <th class="text-end">액션</th>
                </tr>
              </thead>
              <tbody id="db-tbody">
                <tr>
                  <td colspan="9" class="text-center text-muted">
                    데이터 로드 중...
                  </td>
                </tr>
              </tbody>
            </table>
          </div>
        </div>
        <div class="d-flex justify-content-between align-items-center mt-3">
          <div class="small text-muted" id="pagination-info"></div>
          <nav>
            <ul class="pagination pagination-sm mb-0" id="pagination"></ul>
          </nav>
        </div>
      </div>
    </div>
  </div>

    <!-- 등록/수정 모달 -->
    <div class="modal fade" id="dbModal" tabindex="-1" aria-hidden="true">
      <div class="modal-dialog modal-lg">
        <div class="modal-content">
          <div class="modal-header">
            <h5 class="modal-title" id="dbModalTitle">데이터베이스 추가</h5>
            <button
              type="button"
              class="btn-close"
              data-bs-dismiss="modal"
              aria-label="Close"
            ></button>
          </div>
          <div class="modal-body">
            <form id="db-form">
              <input type="hidden" id="form-id" />
              <div class="row g-3">
                <div class="col-md-6">
                  <label class="form-label">이름</label>
                  <input class="form-control" id="form-name" required />
                </div>
                <div class="col-md-6">
                  <label class="form-label">표시명</label>
                  <input class="form-control" id="form-display_name" required />
                </div>
                <div class="col-md-6">
                  <label class="form-label">데이터베이스 타입</label>
                  <select class="form-select" id="form-db_type" required>
                    <option value="">타입을 선택하세요</option>
                    <option value="postgresql" data-port="5432" data-icon="🐘">PostgreSQL</option>
                    <option value="mysql" data-port="3306" data-icon="🐬">MySQL</option>
                    <option value="sqlite" data-port="0" data-icon="📄">SQLite</option>
                  </select>
                  <div class="form-text">데이터베이스 종류를 선택하면 기본 포트가 자동 설정됩니다.</div>
                </div>
                <div class="col-md-6">
                  <label class="form-label">호스트</label>
                  <input class="form-control" id="form-host" required />
                  <div class="form-text" id="host-help">SQLite의 경우 파일 경로를 입력하세요.</div>
                </div>
                <div class="col-md-3">
                  <label class="form-label">포트</label>
                  <input
                    type="number"
                    class="form-control"
                    id="form-port"
                    value="5432"
                  />
                </div>
                <div class="col-md-3">
                  <label class="form-label">DB명</label>
                  <input
                    class="form-control"
                    id="form-database_name"
                    required
                  />
                </div>
                <div class="col-md-4">
                  <label class="form-label">사용자명</label>
                  <input class="form-control" id="form-username" required />
                </div>
                <div class="col-md-4">
                  <label class="form-label">비밀번호</label>
                  <input
                    type="password"
                    class="form-control"
                    id="form-password"
                    placeholder="수정 시 공란이면 기존 비밀번호 유지"
                  />
                  <div class="form-text">수정 시 비밀번호를 비워두면 기존 비밀번호를 유지합니다.</div>
                </div>
                <div class="col-md-4">
                  <label class="form-label">SSL 모드</label>
                  <input
                    class="form-control"
                    id="form-ssl_mode"
                    value="require"
                  />
                </div>
                <div class="col-md-6">
                  <label class="form-label">환경</label>
                  <select class="form-select" id="form-environment">
                    <option value="production">production</option>
                    <option value="staging">staging</option>
                    <option value="development">development</option>
                  </select>
                </div>
                <div class="col-md-6">
                  <label class="form-label">우선순위</label>
                  <select class="form-select" id="form-priority">
                    <option value="high">high</option>
                    <option value="medium">medium</option>
                    <option value="low">low</option>
                  </select>
                </div>
              </div>
            </form>
          </div>
          <div class="modal-footer">
            <button
              type="button"
              class="btn btn-secondary"
              data-bs-dismiss="modal"
            >
              닫기
            </button>
            <button type="button" class="btn btn-primary" id="btn-save">
              저장
            </button>
          </div>
        </div>
      </div>
    </div>

  <!-- Confirm Modal -->
  <div class="modal fade" id="confirmModal" tabindex="-1" aria-hidden="true">
    <div class="modal-dialog">
      <div class="modal-content">
        <div class="modal-header">
          <h5 class="modal-title" id="confirmModalTitle">확인</h5>
          <button type="button" class="btn-close" data-bs-dismiss="modal" aria-label="Close"></button>
        </div>
        <div class="modal-body" id="confirmModalBody">진행하시겠습니까?</div>
        <div class="modal-footer">
          <button type="button" class="btn btn-secondary" data-bs-dismiss="modal">취소</button>
          <button type="button" class="btn btn-danger" id="confirmModalOk">확인</button>
        </div>
      </div>
    </div>
  </div>

  <!-- Toast Container -->
  <div class="position-fixed bottom-0 end-0 p-3" style="z-index: 1080">
    <div id="toastContainer" class="toast-container"></div>
  </div>

  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
  <script src="/static/js/common.js"></script>
  <script src="/static/js/databases.js"></script>
</body>
</html>
