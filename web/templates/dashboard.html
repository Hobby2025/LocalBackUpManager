<!DOCTYPE html>
<html lang="ko">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>대시보드 - 클라우드 데이터베이스 백업 관리 시스템</title>
    <!-- Bootstrap 5 CDN -->
    <link
      href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css"
      rel="stylesheet"
    />
    <!-- Chart.js CDN -->
    <script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.0/dist/chart.umd.min.js"></script>
    <!-- SweetAlert2 CDN (스위트 알람) -->
    <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
    <!-- 공통 UI CSS -->
    <link rel="stylesheet" href="/static/css/common.css" />
  </head>
  <body>
    <nav
      class="navbar navbar-expand-lg navbar-dark bg-primary"
      data-bs-theme="dark"
    >
      <div class="container-fluid">
        <a
          class="navbar-brand ui-font-size-title ui-weight-title"
          href="/dashboard"
          >LocalBackUpManager</a
        >
        <button
          class="navbar-toggler"
          type="button"
          data-bs-toggle="collapse"
          data-bs-target="#navbarNav"
          aria-controls="navbarNav"
          aria-expanded="false"
          aria-label="Toggle navigation"
        >
          <span class="navbar-toggler-icon"></span>
        </button>
        <div class="collapse navbar-collapse" id="navbarNav">
          <ul class="navbar-nav ms-auto">
            <li class="nav-item">
              <a class="nav-link active" href="/dashboard">대시보드</a>
            </li>
            <li class="nav-item">
              <a class="nav-link" href="/databases">데이터베이스</a>
            </li>
            <li class="nav-item">
              <a class="nav-link" href="/api/docs">API 문서</a>
            </li>
            <li class="nav-item ms-2">
              <button
                id="theme-toggle"
                class="btn btn-sm btn-outline-light"
                type="button"
                title="다크 테마 토글"
              >
                🌓
              </button>
            </li>
          </ul>
        </div>
      </div>
    </nav>

    <div class="container my-4">
      <!-- 시스템 상태 카드 -->
      <div class="row g-3">
        <div class="col-12 col-md-3">
          <div class="card h-100">
            <div class="card-body">
              <h6 class="card-title">시스템 상태</h6>
              <p class="fs-4 mb-0">
                <span
                  id="system-status"
                  class="badge rounded-pill text-bg-secondary"
                  >-</span
                >
              </p>
              <small id="system-timestamp" class="text-muted">-</small>
            </div>
          </div>
        </div>
        <div class="col-12 col-md-3">
          <div class="card h-100">
            <div class="card-body">
              <h6 class="card-title">활성 DB</h6>
              <p id="total-databases" class="fs-4 mb-0">0</p>
              <small class="text-muted">총 개수</small>
            </div>
          </div>
        </div>
        <div class="col-12 col-md-3">
          <div class="card h-100">
            <div class="card-body">
              <h6 class="card-title">최근 24h 백업</h6>
              <p id="recent-backups" class="fs-4 mb-0">0</p>
              <small id="success-rate" class="text-muted">성공률: 0%</small>
            </div>
          </div>
        </div>
        <div class="col-12 col-md-3">
          <div class="card h-100">
            <div class="card-body">
              <h6 class="card-title">최근 실패</h6>
              <p id="failed-backups" class="fs-4 mb-0">0</p>
              <small class="text-muted">최근 24h</small>
              <small id="failed-link" class="text-muted"
                ><a href="#" class="text-decoration-none">상세보기</a></small
              >
            </div>
          </div>
        </div>
      </div>

      <!-- 통계 차트 -->
      <div class="row g-3 mt-1">
        <div class="col-12">
          <div class="card">
            <div class="card-header">최근 7일 백업 통계</div>
            <div class="card-body">
              <div class="position-relative" style="height: 360px">
                <div
                  id="chart-spinner"
                  class="position-absolute top-50 start-50 translate-middle text-center"
                >
                  <div class="spinner-border" role="status">
                    <span class="visually-hidden">로딩중...</span>
                  </div>
                  <div class="small text-muted mt-2">차트 로딩 중...</div>
                </div>
                <canvas id="backupsChart" height="80"></canvas>
              </div>
            </div>
          </div>
        </div>
      </div>

      <!-- 평균 지표 차트 -->
      <div class="row g-3 mt-1">
        <div class="col-12">
          <div class="card">
            <div class="card-header">일별 평균 소요 시간 / 압축률</div>
            <div class="card-body">
              <div class="position-relative" style="height: 320px">
                <canvas id="averagesChart" height="80"></canvas>
              </div>
            </div>
          </div>
        </div>
      </div>

      <!-- 최근 백업 / 활성 DB -->
      <div class="row g-3 mt-1">
        <div class="col-12 col-lg-6">
          <div class="card h-100">
            <div class="card-header">최근 백업 10건</div>
            <div class="card-body">
              <div class="table-responsive">
                <table class="table table-sm table-striped mb-0">
                  <thead>
                    <tr>
                      <th>DB</th>
                      <th>상태</th>
                      <th>시간</th>
                    </tr>
                  </thead>
                  <tbody id="recent-backups-body">
                    <tr>
                      <td colspan="3" class="text-center text-muted">
                        데이터 로드 중...
                      </td>
                    </tr>
                  </tbody>
                </table>
              </div>
            </div>
          </div>
        </div>
        <div class="col-12 col-lg-6">
          <div class="card h-100">
            <div class="card-header">활성 데이터베이스</div>
            <div class="card-body">
              <ul
                id="active-databases-list"
                class="list-group list-group-flush"
              >
                <li class="list-group-item text-muted">데이터 로드 중...</li>
              </ul>
            </div>
          </div>
        </div>
      </div>
    </div>

    <!-- Bootstrap Bundle -->
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
    <!-- 대시보드 스크립트 -->
    <script src="/static/js/dashboard.js"></script>
  </body>
</html>
