<!DOCTYPE html>
<html lang="ko">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>백업 상세 - 클라우드 데이터베이스 백업 관리 시스템</title>
    <link
      href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css"
      rel="stylesheet"
    />
    <link rel="stylesheet" href="/static/css/common.css" />
  </head>
  <body>
    {% set active_nav = 'databases' %} {% include '_partials/nav.html' %}

    <div class="container my-4">
      <div class="d-flex justify-content-between align-items-center mb-3">
        <h2 class="m-0">백업 상세</h2>
        <a id="btn-back" class="btn btn-outline-secondary btn-sm" href="/"
          >목록으로</a
        >
      </div>

      <!-- 상세 정보 카드 -->
      <div class="card mb-3">
        <div class="card-body">
          <div class="row g-3">
            <div class="col-12 col-md-6">
              <div class="small text-muted">백업 ID</div>
              <div id="bk-id" class="fw-semibold">-</div>
            </div>
            <div class="col-6 col-md-3">
              <div class="small text-muted">상태</div>
              <div id="bk-status" class="fw-semibold">-</div>
            </div>
            <div class="col-6 col-md-3">
              <div class="small text-muted">유형</div>
              <div id="bk-type" class="fw-semibold">-</div>
            </div>
            <div class="col-12 col-md-4">
              <div class="small text-muted">압축률</div>
              <div id="bk-ratio" class="fw-semibold">-</div>
            </div>
            <div class="col-12 col-md-4">
              <div class="small text-muted">파일 크기</div>
              <div id="bk-size" class="fw-semibold">-</div>
            </div>
            <div class="col-12 col-md-4">
              <div class="small text-muted">암호화</div>
              <div id="bk-encrypted" class="fw-semibold">-</div>
            </div>
            <div class="col-12">
              <div class="small text-muted">파일 경로</div>
              <div id="bk-path" class="text-break">-</div>
            </div>
            <div class="col-12 col-md-6">
              <div class="small text-muted">체크섬(SHA-256)</div>
              <div id="bk-checksum" class="text-break">-</div>
            </div>
            <div class="col-6 col-md-3">
              <div class="small text-muted">소요 시간(초)</div>
              <div id="bk-duration" class="fw-semibold">-</div>
            </div>
            <div class="col-6 col-md-3">
              <div class="small text-muted">완료 시각</div>
              <div id="bk-completed" class="fw-semibold">-</div>
            </div>
          </div>
        </div>
      </div>

      <!-- 오류 메시지 -->
      <div id="bk-error" class="alert alert-danger d-none" role="alert">-</div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
    <script src="/static/js/common.js"></script>
    <script>
      // 백업 상세 JS를 동적으로 포함 (템플릿 변수 사용 불가하므로 data-attr 활용)
      window.__BACKUP_ID__ = "{{ backup_id }}";
    </script>
    <script src="/static/js/backup_detail.js"></script>
  </body>
</html>
