<!DOCTYPE html>
<html lang="ko">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>알림 설정 - 클라우드 데이터베이스 백업 관리 시스템</title>
    <link
      href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css"
      rel="stylesheet"
    />
    <link rel="stylesheet" href="/static/css/common.css" />
  </head>
  <body>
    {% set active_nav = 'notifications' %} {% include '_partials/nav.html' %}

    <div class="container my-4">
      <h2 class="mb-3">알림 설정</h2>

      <form id="notif-settings" class="row g-3">
        <div class="col-12">
          <div class="form-check form-switch">
            <input class="form-check-input" type="checkbox" id="enable" />
            <label class="form-check-label" for="enable"
              >알림 기능 전체 사용</label
            >
          </div>
        </div>
        <div class="col-12 col-md-4">
          <div class="form-check form-switch">
            <input class="form-check-input" type="checkbox" id="ch-email" />
            <label class="form-check-label" for="ch-email"
              >Email 채널 활성화</label
            >
          </div>
        </div>
        <div class="col-12 col-md-4">
          <div class="form-check form-switch">
            <input class="form-check-input" type="checkbox" id="ch-slack" />
            <label class="form-check-label" for="ch-slack"
              >Slack 채널 활성화</label
            >
          </div>
        </div>
        <div class="col-12 col-md-4">
          <div class="form-check form-switch">
            <input class="form-check-input" type="checkbox" id="ch-discord" />
            <label class="form-check-label" for="ch-discord"
              >Discord 채널 활성화</label
            >
          </div>
        </div>

        <div class="col-12"><hr /></div>

        <div class="col-12"><h5>Email 설정</h5></div>
        <div class="col-12 col-md-6">
          <label class="form-label">SMTP Host</label>
          <input class="form-control" id="smtp_host" />
        </div>
        <div class="col-6 col-md-3">
          <label class="form-label">SMTP Port</label>
          <input
            type="number"
            class="form-control"
            id="smtp_port"
            value="587"
          />
        </div>
        <div class="col-6 col-md-3">
          <div class="form-check form-switch mt-4">
            <input class="form-check-input" type="checkbox" id="use_tls" />
            <label class="form-check-label" for="use_tls">TLS 사용</label>
          </div>
        </div>
        <div class="col-12 col-md-4">
          <label class="form-label">Username</label>
          <input class="form-control" id="username" />
        </div>
        <div class="col-12 col-md-4">
          <label class="form-label">Password</label>
          <input type="password" class="form-control" id="password" />
        </div>
        <div class="col-12 col-md-4">
          <label class="form-label">From</label>
          <input class="form-control" id="from_address" />
        </div>
        <div class="col-12">
          <label class="form-label">To (콤마 구분)</label>
          <input
            class="form-control"
            id="to_addresses"
            placeholder="user1@example.com,user2@example.com"
          />
        </div>

        <div class="col-12"><h5 class="mt-3">Slack</h5></div>
        <div class="col-12">
          <label class="form-label">Webhook URL</label>
          <input class="form-control" id="slack_webhook_url" />
        </div>

        <div class="col-12"><h5 class="mt-3">Discord</h5></div>
        <div class="col-12">
          <label class="form-label">Webhook URL</label>
          <input class="form-control" id="discord_webhook_url" />
        </div>

        <div class="col-12 d-flex gap-2">
          <button class="btn btn-primary" type="submit">저장</button>
          <a class="btn btn-outline-secondary" href="/notifications"
            >알림 이력으로</a
          >
        </div>
      </form>

      <div id="save-result" class="small text-muted mt-2"></div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
    <script src="/static/js/settings_notifications.js"></script>
  </body>
</html>
