# PostgreSQL 데이터베이스 설정 파일 예시
# 이 파일을 복사하여 databases.yaml로 사용하세요

# 다중 데이터베이스 설정
databases:
  # 운영 데이터베이스 예시
  production_db:
    name: "운영 데이터베이스"
    host: "prod-db.company.com"
    port: 5432
    database: "production"
    username: "backup_user"
    password: "${PROD_DB_PASSWORD}"  # 환경변수 사용
    ssl_mode: "require"
    priority: "high"
    environment: "production"
    
    # 백업 설정
    backup_config:
      full_backup_schedule: "0 2 * * 0"    # 매주 일요일 2시
      incremental_schedule: "0 */6 * * *"  # 6시간마다
      compression: "lz4"
      encryption: true
      retention_policy:
        daily: 7
        weekly: 4
        monthly: 12

  # 스테이징 데이터베이스 예시
  staging_db:
    name: "스테이징 데이터베이스"
    host: "staging-db.company.com"
    port: 5432
    database: "staging"
    username: "backup_user"
    password: "${STAGING_DB_PASSWORD}"
    ssl_mode: "prefer"
    priority: "medium"
    environment: "staging"
    
    backup_config:
      full_backup_schedule: "0 3 * * 1"    # 매주 월요일 3시
      incremental_schedule: "0 */12 * * *" # 12시간마다
      compression: "gzip"
      encryption: false
      retention_policy:
        daily: 14
        weekly: 8
        monthly: 6
