# 클라우드 데이터베이스 백업 시스템 기본 설정 파일
# 이 파일을 복사하여 settings.yaml로 사용하세요

# 애플리케이션 기본 설정
app:
  name: "Cloud Database Backup Manager"
  version: "1.0.0"
  debug: false
  host: "0.0.0.0"
  port: 8000

# 백업 기본 설정
backup:
  base_path: "./data/backups"
  temp_path: "./data/temp"
  max_parallel_jobs: 3
  default_compression: "gzip"
  default_encryption: true
  compression_level: 3   # 1(빠름) ~ 9(고압축). zstd/lz4는 내부 매핑 적용
  # WAL 아카이빙/증분/PITR 설정 (Phase 4)
  wal:
    enable: false            # true로 설정 시 WAL 아카이빙 기능 활성화
    archive_dir: "./data/wal_archive"  # WAL 보관 경로
    keep_days: 7             # 보존 일수
    base_backup_tool: "pg_basebackup"  # 기본 전체 베이스 백업 도구
  pitr:
    enable: false            # 시점 복구(PITR) 기능 사용 여부
    recovery_window_days: 7  # 복구 가능 윈도우 일수

# 보존 정책
retention:
  default_policy:
    daily: 30 # 30일
    weekly: 12 # 12주
    monthly: 12 # 12개월

# 로깅 설정
logging:
  level: "INFO"
  file_path: "./data/logs/app.log"
  max_size: "10MB"
  backup_count: 5
