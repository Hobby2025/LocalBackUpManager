app:
  debug: false
  host: 0.0.0.0
  name: Cloud Database Backup Manager
  port: 8000
  version: 1.0.0
backup:
  base_path: ./data/backups
  compression_level: 3
  default_compression: gzip
  default_encryption: true
  max_parallel_jobs: 3
  pitr:
    enable: false
    recovery_window_days: 7
  temp_path: ./data/temp
  wal:
    archive_dir: ./data/wal_archive
    base_backup_tool: pg_basebackup
    enable: false
    keep_days: 7
logging:
  backup_count: 5
  file_path: ./data/logs/app.log
  level: INFO
  max_size: 10MB
notifications:
  channels:
    discord: false
    email: false
    slack: false
  discord:
    webhook_url: ""
  email:
    from_address: noreply@example.com
    password: ""
    smtp_host: smtp.example.com
    smtp_port: 587
    to_addresses: []
    use_tls: true
    username: ""
  enable: true
  rules:
    notify_on_success: false
    thresholds:
      compression_ratio_percent_gt: 80
      duration_seconds_gt: 600
    warn_on_thresholds: true
  slack:
    webhook_url: ""
  weekly_summary:
    enable: false
    schedule_cron: 0 9 * * MON
retention:
  default_policy:
    daily: 30
    monthly: 12
    weekly: 12
security:
  enable_hsts: false
  enable_https_redirect: false
  # 로그인 기능 사용 여부
  enable_auth: true
  # 허용 호스트(TrustedHost). 비워두면 '*' 처리. 운영에서는 서비스 도메인을 명시하세요.
  allowed_hosts: []
  # CORS 허용 오리진. 비워두면 '*' 처리.
  cors_origins: []

  # 세션 만료(초)
  session_ttl: 28800

  # 암호화 키 관리(스켈레톤)
  # active_key_id에 해당하는 키(id, key) 쌍을 사용합니다. key는 32자(UTF-8) 권장.
  encryption:
    active_key_id: ""
    keys: [] # 예: [{ id: "k1", key: "32lengthstringkey................" }]
